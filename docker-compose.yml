services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports: ["27017:27017"]
    volumes: ["mongo_data:/data/db"]
  api:
    build: ./server
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/amar_ain
      JWT_SECRET: change-this-secret
      CLIENT_URL: http://localhost:5173
    ports: ["5000:5000"]
    depends_on: [mongo]
  client:
    build: .
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports: ["5173:80"]
    depends_on: [api]
volumes:
  mongo_data:
